name: Sync upstream Hermes releases

on:
  schedule:
    - cron: "0 8 * * *"  # daily at 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get current pinned ref
        id: current
        run: |
          ref=$(grep -oP 'ARG HERMES_GIT_REF=\K.*' Dockerfile)
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

      - name: Get latest upstream release tag
        id: upstream
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag=$(gh api repos/NousResearch/hermes-agent/releases/latest --jq '.tag_name')
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Update Dockerfile if new release
        if: steps.current.outputs.ref != steps.upstream.outputs.tag
        run: |
          old="${{ steps.current.outputs.ref }}"
          new="${{ steps.upstream.outputs.tag }}"
          sed -i "s|ARG HERMES_GIT_REF=${old}|ARG HERMES_GIT_REF=${new}|" Dockerfile
          echo "Updated HERMES_GIT_REF: ${old} -> ${new}"

      - name: Commit and push
        if: steps.current.outputs.ref != steps.upstream.outputs.tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Dockerfile
          git commit -m "chore: bump HERMES_GIT_REF to ${{ steps.upstream.outputs.tag }}"
          git push
